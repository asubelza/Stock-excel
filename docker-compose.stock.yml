version: '3'

services:
  stock:
    build: .
    environment:
      - DATABASE_URL=postgresql://stockuser:stockpass123@db:5432/stockdb
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass123
      POSTGRES_DB: stockdb
    volumes:
      - stock_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  stock_db_data: