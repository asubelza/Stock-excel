{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Nueva Entrada de Stock</h2>
    </div>
    
    <div class="row" style="margin-bottom:20px;">
        <div class="col">
            <div class="form-group">
                <label>Tipo Comprobante</label>
                <select id="entrada_tipo" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
                    <option value="Factura">Factura</option>
                    <option value="Remito">Remito</option>
                    <option value="Presupuesto">Presupuesto</option>
                    <option value="Orden de compra">Orden de compra</option>
                </select>
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label>Nro Comprobante</label>
                <input type="text" id="entrada_nro">
            </div>
        </div>
    </div>
    
    <div class="card" style="background:#f8f9fa;">
        <h3 style="margin-bottom:15px;">Proveedor (opcional)</h3>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>CUIT</label>
                    <input type="text" id="prov_cuit">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="prov_nombre">
                </div>
            </div>
        </div>
    </div>
    
    <div class="card" style="background:#fff; border:1px solid #ddd;">
        <h3 style="margin-bottom:15px;">Agregar Productos</h3>
        <div class="row">
            <div class="col-2">
                <div class="form-group">
                    <label>SKU o Nombre</label>
                    <input type="text" id="prod_sku" onkeyup="buscar_productos()" autocomplete="off">
                    <div id="prod_resultados" class="resultados"></div>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>Cantidad</label>
                    <input type="number" id="prod_cant" value="1" min="1">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>Costo Unitario</label>
                    <input type="number" id="prod_costo" value="0" step="0.01">
                </div>
            </div>
        </div>
        <button class="btn btn-success" onclick="agregar_item()">+ Agregar</button>
    </div>
    
    <h3 style="margin-top:20px;">Items a Entrar</h3>
    <table class="items-table">
        <thead>
            <tr>
                <th>SKU</th>
                <th>Nombre</th>
                <th>Cantidad</th>
                <th>Costo</th>
                <th>Subtotal</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="items_tabla">
        </tbody>
    </table>
    
    <div class="totales">
        <strong>Total: </strong><span id="total_cant">0</span> unidades - $<span id="total_importe">0</span>
    </div>
    
    <div style="margin-top:20px;">
        <button class="btn btn-success" onclick="confirmar_entrada()">Confirmar Entrada</button>
        <a href="/stock/stockdb" class="btn">Cancelar</a>
    </div>
</div>

<script>
let items = [];

function buscar_productos() {
    const q = document.getElementById('prod_sku').value;
    if (q.length < 2) {
        document.getElementById('prod_resultados').style.display = 'none';
        return;
    }
    
    fetch('/stock/api/productos?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            const div = document.getElementById('prod_resultados');
            if (data.length === 0) {
                div.style.display = 'none';
                return;
            }
            div.innerHTML = data.map(p => 
                '<div onclick="seleccionar_producto(\'' + p.sku + '\',\'' + p.nombre + '\',' + p.stock + ')">' + 
                p.sku + ' - ' + p.nombre + ' (Stock: ' + p.stock + ')</div>'
            ).join('');
            div.style.display = 'block';
        });
}

function seleccionar_producto(sku, nombre, stock) {
    document.getElementById('prod_sku').value = sku + ' - ' + nombre;
    document.getElementById('prod_resultados').style.display = 'none';
}

function agregar_item() {
    const texto = document.getElementById('prod_sku').value;
    const parts = texto.split(' - ');
    const sku = parts[0] ? parts[0].trim() : '';
    const nombre = parts[1] ? parts[1].trim() : texto;
    const cant = parseInt(document.getElementById('prod_cant').value) || 0;
    const costo = parseFloat(document.getElementById('prod_costo').value) || 0;
    
    if (!sku || cant < 1) {
        alert('Ingrese SKU y cantidad validos');
        return;
    }
    
    items.push({sku, nombre, cantidad: cant, costo});
    actualizar_tabla();
    
    document.getElementById('prod_sku').value = '';
    document.getElementById('prod_cant').value = '1';
    document.getElementById('prod_costo').value = '0';
    document.getElementById('prod_sku').focus();
}

function actualizar_tabla() {
    const tbody = document.getElementById('items_tabla');
    let total_cant = 0, total_importe = 0;
    
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">No hay items agregados</td></tr>';
    } else {
        tbody.innerHTML = items.map((item, idx) => {
            total_cant += item.cantidad;
            total_importe += item.cantidad * item.costo;
            return '<tr><td>' + item.sku + '</td><td>' + item.nombre + '</td><td>' + item.cantidad + '</td><td>$' + item.costo.toFixed(2) + '</td><td>$' + (item.cantidad * item.costo).toFixed(2) + '</td><td><button class="btn btn-danger" style="padding:4px 8px;" onclick="eliminar_item(' + idx + ')">X</button></td></tr>';
        }).join('');
    }
    
    document.getElementById('total_cant').textContent = total_cant;
    document.getElementById('total_importe').textContent = total_importe.toFixed(2);
}

function eliminar_item(idx) {
    items.splice(idx, 1);
    actualizar_tabla();
}

function confirmar_entrada() {
    if (items.length === 0) {
        alert('No hay items para registrar');
        return;
    }
    
    fetch('/stock/api/entrada', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            nro_comp: document.getElementById('entrada_nro').value,
            tipo_comp: document.getElementById('entrada_tipo').value,
            proveedor_cuit: document.getElementById('prov_cuit').value,
            proveedor_nombre: document.getElementById('prov_nombre').value,
            items: items
        })
    }).then(r => r.json()).then(data => {
        alert(data.msg);
        if (data.ok) location.href = '/stock/entrada';
    });
}
</script>
{% endblock %}
