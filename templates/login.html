{% extends "base.html" %}

{% block content %}
<div class="login-box">
    <h2>Iniciar Sesion</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="usuario" required autofocus>
        </div>
        <div class="form-group">
            <label>Contrasena</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Ingresar</button>
    </form>
    <p style="margin-top: 20px; text-align: center;">
        <a href="/stock/docs/instructivo_admin.html" target="_blank" style="color: #3498db; font-size: 12px;">Manual Administrador</a>
        <span style="color: #ccc; margin: 0 8px;">|</span>
        <a href="/stock/docs/instructivo_usuarios.html" target="_blank" style="color: #3498db; font-size: 12px;">Manual Usuarios</a>
    </p>
</div>
{% endblock %}
