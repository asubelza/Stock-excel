{% extends "base.html" %}

{% block content %}
<div class="login-box">
    <h2>Iniciar Sesion</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="usuario" required autofocus>
        </div>
        <div class="form-group">
            <label>Contrasena</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Ingresar</button>
    </form>
    <p style="margin-top: 20px; text-align: center; color: #666; font-size: 12px;">
        Admin: admin/admin123 | Deposito: deposito/depo123 | Ventas: ventas/vta123
    </p>
</div>
{% endblock %}
