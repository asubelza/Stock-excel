{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Nuevo Producto</h2>
    </div>
    
    <div class="row">
        <div class="col">
            <div class="form-group">
                <label>SKU *</label>
                <input type="text" id="prod_sku" required>
            </div>
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="prod_nombre" required>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="prod_tipo">
                    <option value="P">Producto</option>
                    <option value="S">Insumo</option>
                    <option value="K">Kit</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rubro</label>
                <input type="text" id="prod_rubro">
            </div>
            <div class="form-group">
                <label>Codigo de Barra</label>
                <input type="text" id="prod_cod_barra">
            </div>
        </div>
        <div class="col">
            <div class="form-group">
                <label>Stock Inicial</label>
                <input type="number" id="prod_stock" value="0">
            </div>
            <div class="form-group">
                <label>Stock Minimo</label>
                <input type="number" id="prod_stock_min" value="0">
            </div>
            <div class="form-group">
                <label>Deposito</label>
                <input type="text" id="prod_deposito" value="Principal">
            </div>
            <div class="form-group">
                <label>Costo</label>
                <input type="number" id="prod_costo" value="0" step="0.01">
            </div>
            <div class="form-group">
                <label>Precio</label>
                <input type="number" id="prod_precio" value="0" step="0.01">
            </div>
        </div>
    </div>
    
    <div style="margin-top:20px;">
        <button class="btn btn-success" onclick="guardar()">Guardar Producto</button>
        <a href="/stock/stockdb" class="btn">Cancelar</a>
    </div>
</div>

<script>
function guardar() {
    const sku = document.getElementById('prod_sku').value.trim();
    const nombre = document.getElementById('prod_nombre').value.trim();
    
    if (!sku || !nombre) {
        alert('SKU y Nombre son requeridos');
        return;
    }
    
    fetch('/stock/api/producto', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            sku: sku,
            nombre: nombre,
            tipo: document.getElementById('prod_tipo').value,
            estado: 'A',
            rublo: document.getElementById('prod_rubro').value,
            cod_barra: document.getElementById('prod_cod_barra').value,
            stock: parseInt(document.getElementById('prod_stock').value) || 0,
            stock_min: parseInt(document.getElementById('prod_stock_min').value) || 0,
            deposito: document.getElementById('prod_deposito').value,
            costo: parseFloat(document.getElementById('prod_costo').value) || 0,
            precio: parseFloat(document.getElementById('prod_precio').value) || 0
        })
    }).then(r => r.json()).then(data => {
        alert(data.msg);
        if (data.ok) location.href = '/stock/';
    });
}
</script>
{% endblock %}
